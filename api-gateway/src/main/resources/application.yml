spring:
  application:
    name: api-gateway
  config:
    import: "optional:configserver:http://localhost:8088"
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: ms-accesorios
              uri: lb://ms-accesorios
              predicates:
                - Path=/api/accesorios/**
            - id: ms-clientes
              uri: http://localhost:8085
              predicates:
                - Path=/api/clientes/**
            - id: ms-herramientas
              uri: http://localhost:8083
              predicates:
                - Path=/api/herramientas/**
            - id: ms-proyectos
              uri: http://localhost:8087
              predicates:
                - Path=/api/proyectos/**
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/auth/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true