spring:
  application:
    name: ms-clientes
  config:
    import: "optional:configserver:http://localhost:8088"
  datasource:
    url: jdbc:postgresql://localhost:5433/db_clientes?createDatabaseIfNotExist=true
    username: postgres
    password: oracle123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    serialization:
      indent-output: true

server:
  port: 8085
  # Si quieres el context-path como en el ejemplo de clase, descomenta la siguiente línea:
  # servlet:
  #   context-path: /clientes

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# --- CONFIGURACIÓN DE MONITOREO (ACTUATOR) ---
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

# --- CONFIGURACIÓN DE RESILIENCIA (RESILIENCE4J) ---
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
    instances:
      # IMPORTANTE: Este nombre debe coincidir con @CircuitBreaker(name = "clientesCB")
      clientesCB:
        baseConfig: default

