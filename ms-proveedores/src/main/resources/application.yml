spring:
  application:
    name: ms-proveedores
  config:
    import: "optional:configserver:http://localhost:8088"
  datasource:
    # MySQL en Docker puerto 3307
    url: jdbc:mysql://localhost:3307/db_proveedores?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: mysql123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  jackson:
    serialization:
      indent-output: true

server:
  port: 8092

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# --- CONFIGURACIÓN DE MONITOREO (ACTUATOR) ---
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

# --- CONFIGURACIÓN DE RESILIENCIA (RESILIENCE4J) ---
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
    instances:
      # IMPORTANTE: Este nombre debe coincidir con @CircuitBreaker(name = "proveedoresCB")
      proveedoresCB:
        baseConfig: default